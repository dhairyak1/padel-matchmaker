<!doctype html>
<html>
  <head>
    <title>Find Matches • PadelPaglu</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav id="siteNavbar" class="navbar"></nav>

    <div class="container">
      <div class="page-header">
        <h1>Find Matches 🎾</h1>

        <p>Join open padel games near you!</p>

        <p id="locationStatus" class="helper-text"></p>

        <div class="filters-card">
          <input
            type="text"
            id="venueFilter"
            placeholder="Search by venue or area..."
          />
        </div>
      </div>
      <div id="matchesContainer" class="match-list">Loading Matches...</div>

      <div
        id="emptyState"
        style="
          display: none;
          text-align: center;
          color: #94a3b8;
          margin-top: 20px;
          font-size: 14px;
        "
      >
        No matches available right now
      </div>
    </div>
    <script src="nav.js"></script>
    <script src="find.js"></script>

    <div id="loginModal" class="modal-overlay">
      <div class="modal-card">
        <h3>🔒 Login Required</h3>

        <p>Please sign in with Google to continue.</p>

        <button id="loginModalButton">Go to Login</button>
      </div>
    </div>
  </body>
</html>
