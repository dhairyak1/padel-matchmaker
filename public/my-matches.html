<!doctype html>
<html>
  <head>
    <title>My Matches • PadelPaglu</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <nav id="siteNavbar" class="navbar"></nav>

    <div class="container">
      <h2>My Matches</h2>

      <p class="helper-text">
        Matches marked as <strong>Full</strong> or <strong>Deleted</strong> will
        no longer be visible to other players.
      </p>

      <div id="myMatchesContainer">Loading...</div>
    </div>
    <script src="nav.js"></script>
    <script src="my-matches.js"></script>

    <div id="loginModal" class="modal-overlay">
      <div class="modal-card">
        <h3>🔒 Login Required</h3>

        <p>Please sign in with Google to continue.</p>

        <button id="loginModalButton">Continue with Google</button>
      </div>
    </div>
  </body>
</html>
